<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAMMYY Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #fdf5ee;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .bounce-hover:hover {
            transform: translateY(-2px);
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#fffdfa', 100: '#fdf5ee' },
                        brown: { 200: '#e5d0c3', 300: '#d4b49e', 400: '#bc9680', 500: '#9d755d', 600: '#7a5743' },
                        pink: { 100: '#fce7f3', 200: '#fbcfe8', 300: '#f9a8d4', 400: '#f472b6' }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 text-brown-500 relative overflow-x-hidden bg-cream-50">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-pink-400 text-white px-6 py-3 rounded-full shadow-md transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-pink-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        คัดลอกสำเร็จ
    </div>

    <div class="relative z-10 mb-8 flex items-center justify-center gap-2 mt-4 text-brown-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-pink-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 9.563C9 9.252 9.252 9 9.563 9h4.874c.311 0 .563.252.563.563v4.874c0 .311-.252.563-.563.563H9.564A.562.562 0 019 14.437V9.564z" />
        </svg>
        <h1 class="text-2xl md:text-3, font-bold tracking-wide">BEAMMYY Payment</h1>
    </div>

    <div class="max-w-md w-full relative z-10">
        <svg class="absolute -top-6 -left-2 w-5 h-5 text-pink-300 rotate-12 animate-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        
        <div class="bg-white p-2 rounded-[24px] border border-pink-200 shadow-sm relative z-10 mb-6">
            <img src="image.png" alt="บัญชี BEAMMYY" class="w-full h-auto object-cover rounded-[16px]" onerror="this.src='https://placehold.co/600x600/ffe4e6/be123c?text=BEAMMYY+Payment'">
        </div>

        <div class="bg-white px-6 pb-8 pt-8 rounded-[24px] border border-pink-200 shadow-sm relative z-10">
            <div class="space-y-6 relative z-10">
                <div class="text-center space-y-4">
                    <p class="text-[15px] leading-relaxed font-medium text-brown-500">
                        เลขบัญชีตามนี้เลยคับคนสวย 
                        <br>ชื่อบัญชี <span class="font-bold text-pink-400">ธมนวรรณ คงกลั่นดี</span> เท่านั้นน้า!!
                        <br><span class="text-[13px] text-brown-400 font-normal mt-1 block">โอนแล้วแจ้งสลิปทุกครั้งด้วยนะคะ</span>
                    </p>
                </div>

                <div class="space-y-4 pt-2 border-t border-dashed border-pink-200">
                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border border-blue-100 shadow-sm transition-all hover:border-blue-300">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs border border-blue-100">KTB</div>
                            <div>
                                <div class="text-[11px] text-brown-400 font-medium">กรุงไทย (ธมนวรรณ)</div>
                                <div class="font-bold tracking-wider text-blue-600 text-base">626-0-50080-7</div>
                            </div>
                        </div>
                        <button onclick="copyText('6260500807', this)" class="bounce-hover bg-pink-50 hover:bg-pink-100 text-pink-500 text-[12px] font-semibold px-4 py-2 rounded-full transition-colors border border-pink-200">คัดลอก</button>
                    </div>

                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border border-orange-100 shadow-sm transition-all hover:border-orange-300">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-orange-500 font-bold text-lg border border-orange-100">W</div>
                            <div>
                                <div class="text-[11px] text-brown-400 font-medium">วอเลท (ธมนวรรณ)</div>
                                <div class="font-bold tracking-wider text-orange-500 text-base">093-195-4284</div>
                            </div>
                        </div>
                        <button onclick="copyText('0931954284', this)" class="bounce-hover bg-pink-50 hover:bg-pink-100 text-pink-500 text-[12px] font-semibold px-4 py-2 rounded-full transition-colors border border-pink-200">คัดลอก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, buttonElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', '-translate-y-4'); }, 2500);
        }
    </script>
</body>
</html>
